<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,500;0,600;0,700;0,800;1,600;1,700;1,800&family=Noto+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>JackCast</title>
    <meta
      name="description"
      content="JackCast is a fast, installable weather PWA with current conditions, hourly forecast, weekly outlook, and air quality in a calm full-screen experience."
    />
    <meta
      name="robots"
      content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1"
    />
    <meta name="application-name" content="JackCast" />
    <meta name="apple-mobile-web-app-title" content="JackCast" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="canonical" href="https://jackcast.codingnoodles.com/" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#161b1d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="JackCast" />
    <meta property="og:title" content="JackCast" />
    <meta
      property="og:description"
      content="JackCast is a fast, installable weather app with current conditions, hourly forecast, weekly outlook, and air quality."
    />
    <meta property="og:image" content="https://jackcast.codingnoodles.com/logo.png" />
    <meta property="og:image:width" content="1024" />
    <meta property="og:image:height" content="1024" />
    <meta property="og:image:alt" content="JackCast app icon" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="JackCast" />
    <meta
      name="twitter:description"
      content="JackCast is a fast, installable weather app with current conditions, hourly forecast, weekly outlook, and air quality."
    />
    <meta name="twitter:image" content="https://jackcast.codingnoodles.com/logo.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <link rel="icon" href="/favicon.png" type="image/png" sizes="32x32" />
    <link rel="icon" href="/logo_192.png" type="image/png" sizes="192x192" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "JackCast",
        "description": "JackCast is a fast, installable weather PWA with current conditions, hourly forecast, weekly outlook, and air quality.",
        "applicationCategory": "WeatherApplication",
        "operatingSystem": "Any",
        "image": "https://jackcast.codingnoodles.com/logo.png",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
    <style>
      /* Instant splash while the app shell loads (PWA + first visit) */
      html,
      body {
        margin: 0;
        background: #000;
      }
      #root:empty {
        min-height: 100dvh;
        background: #000 url("/logo_192.png") center / 128px no-repeat;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
