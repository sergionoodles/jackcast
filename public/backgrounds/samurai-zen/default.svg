<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1280" role="img" aria-labelledby="title description">
  <title id="title">Samurai Zen landscape</title>
  <desc id="description">A quiet ink wash mountain landscape with a vermilion sun and torii gate.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfc4ac"/>
      <stop offset="0.52" stop-color="#918778"/>
      <stop offset="1" stop-color="#29251f"/>
    </linearGradient>
    <radialGradient id="haze" cx="52%" cy="34%" r="58%">
      <stop offset="0" stop-color="#f0e4ca" stop-opacity=".64"/>
      <stop offset="1" stop-color="#e6d8bd" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur18"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="blur7"><feGaussianBlur stdDeviation="7"/></filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".72" numOctaves="3" seed="8"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .09"/></feComponentTransfer>
    </filter>
  </defs>
  <rect width="720" height="1280" fill="url(#paper)"/>
