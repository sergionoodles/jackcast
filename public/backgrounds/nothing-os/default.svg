<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1280" role="img" aria-labelledby="title description">
  <title id="title">Nothing OS inspired background</title>
  <desc id="description">A monochrome technical field with dotted forms, thin interface lines, and a red signal.</desc>
  <defs>
    <radialGradient id="glow" cx="50%" cy="28%" r="62%">
      <stop offset="0" stop-color="#343434"/>
      <stop offset=".48" stop-color="#151515"/>
      <stop offset="1" stop-color="#050505"/>
    </radialGradient>
    <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#f2f2f2" opacity=".24"/>
    </pattern>
    <pattern id="microdots" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r=".8" fill="#fff" opacity=".42"/>
    </pattern>
    <filter id="soft"><feGaussianBlur stdDeviation="22"/></filter>
  </defs>
  <rect width="720" height="1280" fill="url(#glow)"/>
  <circle cx="557" cy="290" r="130" fill="none" stroke="#e22922" stroke-width="24" opacity=".9"/>
  <circle cx="557" cy="290" r="176" fill="none" stroke="#e22922" stroke-width="3" stroke-dasharray="3 15" opacity=".48"/>
  <path d="M84 186 H341 M84 205 H276" stroke="#eee" stroke-width="3" stroke-dasharray="2 12" opacity=".65"/>
  <text x="84" y="164" fill="#f2f2f2" font-family="monospace" font-size="22" letter-spacing="6">WEATHER / SIGNAL</text>
  <rect x="58" y="464" width="604" height="424" rx="62" fill="url(#dots)" opacity=".88"/>
  <path d="M114 759 C180 624 257 696 325 574 C400 440 492 522 604 580" fill="none" stroke="#f3f3f3" stroke-width="8" stroke-linecap="round" stroke-dasharray="1 20"/>
  <circle cx="325" cy="574" r="76" fill="url(#microdots)"/>
  <circle cx="325" cy="574" r="24" fill="#ededed"/>
  <path d="M78 1018 H642" stroke="#fff" stroke-opacity=".36"/>
  <path d="M78 1035 H420" stroke="#fff" stroke-width="5" stroke-dasharray="2 14" opacity=".66"/>
  <g fill="#ededed" font-family="monospace">
    <text x="78" y="1094" font-size="22" letter-spacing="4">ATMOSPHERE</text>
    <text x="78" y="1136" font-size="48" font-weight="700">01</text>
    <text x="580" y="1136" font-size="22" text-anchor="end">LIVE</text>
  </g>
  <circle cx="592" cy="1129" r="8" fill="#e22922"/>
  <ellipse cx="360" cy="800" rx="270" ry="132" fill="#fff" opacity=".045" filter="url(#soft)"/>
</svg>
